name: Build Android APK + Deploy Web

on:
  push:
    branches:
      - claude/android-alarm-sleep-app-49Ohb
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── Job 1: Build Android APK ──────────────────────────
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: sleep_alarm
        run: flutter pub get

      - name: Run analyzer
        working-directory: sleep_alarm
        run: flutter analyze

      - name: Build release APK
        working-directory: sleep_alarm
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SleepWell-release-apk
          path: sleep_alarm/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Show APK info
        run: |
          ls -lh sleep_alarm/build/app/outputs/flutter-apk/
          echo "✅ APK built successfully!"

  # ── Job 2: Deploy Web App to GitHub Pages ─────────────
  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload web app
        uses: actions/upload-pages-artifact@v3
        with:
          path: sleep_alarm_web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
